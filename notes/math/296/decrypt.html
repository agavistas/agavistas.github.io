<!doctype html>
<html class="html">
<head>
    <meta charset="utf-8">
    <title>Protected Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0"/>
    <meta http-equiv="cache-control" content="no-cache"/>
    <meta http-equiv="expires" content="0"/>
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT"/>
    <meta http-equiv="pragma" content="no-cache"/>

    <style>
        .hr {
            margin-top: 20px;
            margin-bottom: 20px;
            border: 0;
            border-top: 1px solid #eee;
        }

        .page {
            width: 360px;
            padding: 8% 0 0;
            margin: auto;
            box-sizing: border-box;
        }

        .form {
            position: relative;
            z-index: 1;
            background: #FFFFFF;
            max-width: 360px;
            margin: 0 auto 100px;
            padding: 45px;
            text-align: center;
        }

        .form input {
            outline: 0;
            background: #f2f2f2;
            width: 100%;
            border: 0;
            margin: 0 0 15px;
            padding: 15px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form .decrypt-button {
            text-transform: uppercase;
            outline: 0;
            background: #f2ce85;
            width: 100%;
            border: 0;
            padding: 15px;
            color: #FFFFFF;
            font-size: 14px;
            cursor: pointer;
        }

        .form .decrypt-button:hover, .form .decrypt-button:active, .form .decrypt-button:focus {
            background: #ff2c4b;
        }

        .html {
            height: 100%;
        }

        .body {
            margin-bottom: 1em;
            background: #e4e4e4; /* fallback for old browsers */
            font-family: "Arial", sans-serif;
        }

        .instructions {
            margin-top: -1em;
            margin-bottom: 1em;
        }

        .title {
            font-size: 1.5em;
        }

        .footer {
            position: fixed;
            height: 20px;
            font-size: 16px;
            padding: 2px;
            bottom: 0;
            left: 0;
            right: 0;
            margin-bottom: 0;
        }

        .footer p {
            margin: 2px;
            text-align: center;
            float: right;
        }

        .footer a {
            text-decoration: none;
        }
    </style>
</head>

<body class="body">
<div class="page">
    <div class="form">
        <div class="instructions">
            <p class="title">Protected Page</p>
            <p>Professor Stephen DeBacker has requested all materials related to MATH 296 not be publicly accessible. As such, all pages under this directory have basic encryption implemented.</p>
        </div>

        <hr class="hr">

            <input id="password"
                   type="password"
                   name="password"
                   placeholder="Password"
                   autofocus/>

            <input type="submit" class="decrypt-button" value="DECRYPT" onclick="math296save()"/>
    </div>

</div>
<footer class="footer">
</footer>

<script>
  function math296save() {
      localStorage.setItem("math296", document.getElementById('password').value);
      location.href = document.referrer;
  }
</script>
</body>
</html>
